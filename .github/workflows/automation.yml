name: Zotero to Readwise Automation

on:
  push:
    branches:
      - master
  schedule:
    - cron: "33 11 * * *" # Runs at 12:33 PM (UTC) every day (Check https://crontab.guru/)

jobs:
  zotero-to-readwise-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 🍽️ Checkout the repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: 💿 Install Zotero2Readwise Python package
        run: pip install zotero2readwise

      - name: 📥 Download the Python script needed for automation
        run:  curl https://raw.githubusercontent.com/e-alizadeh/Zotero2Readwise/master/zotero2readwise/run.py -o run.py
      
      - name: 📥 Download the helper module
        run:  curl https://raw.githubusercontent.com/e-alizadeh/Zotero2Readwise/master/zotero2readwise/helper.py -o helper.py
      
      - name: 🚀 Run Automation
        run: python run.py ${{ secrets.READWISE_TOKEN }} ${{ secrets.ZOTERO_KEY }} ${{ secrets.ZOTERO_ID }} --include_notes='y' 
        
      - name: 🚀 Run Automation on group lib
        run: python run.py ${{ secrets.READWISE_TOKEN }} ${{ secrets.ZOTERO_GROUPKEY }} ${{ secrets.ZOTERO_GROUPID }} --include_notes='y' --library_type="group" 
        
